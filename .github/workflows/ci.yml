name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 6 * * *"   # daily green signal
  workflow_dispatch:

# NOTE: the live Binance-demo integration tests are NOT run here. GitHub-hosted
# runners are geo-blocked by Binance (HTTP 451 "restricted location"), so those
# tests must run from an allowed IP. Run them on a schedule from a machine in an
# allowed region via scripts/run_demo_integration.sh (see that file).

jobs:
  unit-tests:
    name: Unit tests (mocked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - run: pip install -r requirements/dev.txt
      # Demo integration tests auto-skip here (RUN_DEMO_INTEGRATION unset).
      - run: python -m pytest -q
        env:
          DJANGO_SECRET_KEY: ci-dummy-secret-key-not-used-for-anything
