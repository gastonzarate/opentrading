services:
  postgres:
    image: postgres:17-alpine
    container_name: shark-bot-postgres-container
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres_user", "-d", "app_db"]
      interval: 5s
      timeout: 3s
      retries: 5
  api:
    env_file: .env
    container_name: shark-bot-api-container
    build:
      context: .
      dockerfile: Dockerfile
      target: base
      args:
        ENVIRONMENT: ${ENVIRONMENT}
    command: sh -c "sleep 5 && python manage.py runserver 0.0.0.0:8000"
    stdin_open: true
    tty: true
    environment:
      # In-cluster address of the news MCP (service DNS). Kept here rather than in
      # .env because it is infra wiring, not a secret.
      - MCP_TRENDRADAR_URL=http://trend-radar-mcp:3333/mcp
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    ports:
      - "8099:8000"

  # TrendRadar - News crawler (populates ./trendradar/output DBs on a schedule).
  # The v6.10.0 image is driven by RUN_MODE/CRON_SCHEDULE/IMMEDIATE_RUN; the older
  # ENABLE_*/REPORT_MODE env vars are ignored by its entrypoint.
  trend-radar:
    image: wantcat/trendradar:latest
    container_name: shark-bot-trendradar
    env_file: .env
    environment:
      - RUN_MODE=cron
      - CRON_SCHEDULE=*/15 * * * *   # crawl every 15 minutes
      - IMMEDIATE_RUN=true           # also crawl once on startup
    volumes:
      - ./trendradar/config:/app/config
      - ./trendradar/output:/app/output
    ports:
      - "8097:8080"
    restart: unless-stopped

  # TrendRadar MCP - serves the crawled data to the trading agent via get_news.
  # FastMCP on port 3333; reads config.yaml + the shared output DBs.
  trend-radar-mcp:
    image: wantcat/trendradar-mcp:latest
    container_name: shark-bot-trendradar-mcp
    env_file: .env
    volumes:
      - ./trendradar/config:/app/config
      - ./trendradar/output:/app/output
    ports:
      - "3333:3333"
    depends_on:
      - trend-radar
    restart: unless-stopped

volumes:
  pgdata: {}
